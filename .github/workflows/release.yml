name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Build & publish release assets
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 16 (Swift 6)
        run: sudo xcode-select -s /Applications/Xcode_16.app

      - name: Import Developer ID certificate
        if: ${{ env.CERT != '' }}
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.MACOS_CERT_P12 }}
          p12-password: ${{ secrets.MACOS_CERT_PASSWORD }}
        env:
          CERT: ${{ secrets.MACOS_CERT_P12 }}

      - name: Build DMG (sign + notarize if secrets present)
        run: ./scripts/ci-dmg.sh
        env:
          SIGN_IDENTITY: ${{ secrets.MACOS_SIGN_IDENTITY }}
          AC_API_KEY_P8: ${{ secrets.AC_API_KEY_P8 }}
          AC_KEY_ID: ${{ secrets.AC_KEY_ID }}
          AC_ISSUER_ID: ${{ secrets.AC_ISSUER_ID }}

      - name: Create ZIP release asset
        run: |
          VERSION="$(/usr/libexec/PlistBuddy -c 'Print CFBundleShortVersionString' scripts/AppInfo.plist)"
          ditto -c -k --keepParent build/Kabigon.app "build/Kabigon-$VERSION.zip"
          shasum -a 256 "build/Kabigon-$VERSION.zip"

      - name: Publish to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="$(/usr/libexec/PlistBuddy -c 'Print CFBundleShortVersionString' scripts/AppInfo.plist)"
          if [ "$GITHUB_REF_TYPE" = "tag" ]; then
            TAG="$GITHUB_REF_NAME"
          else
            TAG="v$VERSION"
          fi
          gh release view "$TAG" >/dev/null 2>&1 \
            || gh release create "$TAG" --title "Kabigon $TAG" --generate-notes
          gh release upload "$TAG" build/*.dmg build/*.zip --clobber
