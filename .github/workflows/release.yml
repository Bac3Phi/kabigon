name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: release
  cancel-in-progress: true

jobs:
  release:
    name: Build & publish release assets
    runs-on: macos-15
    environment:
      name: github-pages
      url: ${{ steps.deploy-pages.outputs.page_url }}
    env:
      SPARKLE_ED_PRIVATE_KEY: ${{ secrets.SPARKLE_ED_PRIVATE_KEY }}
    steps:
      - uses: actions/checkout@v6

      - name: Resolve release tag
        run: |
          VERSION="$(/usr/libexec/PlistBuddy -c 'Print CFBundleShortVersionString' scripts/AppInfo.plist)"
          TAG="v$VERSION"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "RELEASE_TAG=$TAG" >> "$GITHUB_ENV"

      - name: Tag current commit
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          REMOTE_TAG_SHA="$(git ls-remote origin "refs/tags/$RELEASE_TAG" | awk '{print $1}')"
          if [ "$REMOTE_TAG_SHA" = "$GITHUB_SHA" ]; then
            echo "$RELEASE_TAG already points at $GITHUB_SHA"
          else
            git tag -f "$RELEASE_TAG" "$GITHUB_SHA"
            git push --force origin "refs/tags/$RELEASE_TAG"
          fi

      - name: Select Xcode 16 (Swift 6)
        run: |
          set -euo pipefail
          XCODE_PATH="$(find /Applications -maxdepth 1 -name 'Xcode_16*.app' -print | sort | tail -n 1)"
          if [ -z "$XCODE_PATH" ]; then
            echo "No Xcode 16 installation found. Available Xcodes:"
            ls -d /Applications/Xcode*.app || true
            exit 1
          fi
          sudo xcode-select -s "$XCODE_PATH/Contents/Developer"
          xcodebuild -version

      - name: Import Developer ID certificate
        if: ${{ env.CERT != '' }}
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.MACOS_CERT_P12 }}
          p12-password: ${{ secrets.MACOS_CERT_PASSWORD }}
        env:
          CERT: ${{ secrets.MACOS_CERT_P12 }}

      - name: Build app for ZIP
        run: |
          if ./scripts/build-app.sh release; then
            echo "Universal release build succeeded."
          else
            echo "Universal app build failed; retrying native release build for ZIP."
            if KABIGON_UNIVERSAL=0 ./scripts/build-app.sh release; then
              echo "Native release build succeeded."
            else
              echo "Native release build failed; retrying native debug build for ZIP."
              KABIGON_UNIVERSAL=0 ./scripts/build-app.sh debug
            fi
          fi

      - name: Create ZIP release asset
        run: |
          ditto -c -k --keepParent build/Kabigon.app "build/Kabigon-$VERSION.zip"
          shasum -a 256 "build/Kabigon-$VERSION.zip"

      - name: Write Sparkle appcast
        if: ${{ env.SPARKLE_ED_PRIVATE_KEY != '' }}
        run: ./scripts/write-appcast.sh "$VERSION" "build/Kabigon-$VERSION.zip"

      - name: Build DMG (optional)
        run: |
          if ./scripts/ci-dmg.sh; then
            echo "DMG build succeeded."
          else
            echo "::warning::Optional DMG build failed; continuing with ZIP-only release."
          fi
        env:
          SIGN_IDENTITY: ${{ secrets.MACOS_SIGN_IDENTITY }}
          AC_API_KEY_P8: ${{ secrets.AC_API_KEY_P8 }}
          AC_KEY_ID: ${{ secrets.AC_KEY_ID }}
          AC_ISSUER_ID: ${{ secrets.AC_ISSUER_ID }}

      - name: Publish to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "$RELEASE_TAG" >/dev/null 2>&1 \
            || gh release create "$RELEASE_TAG" --target "$GITHUB_SHA" --title "Kabigon $RELEASE_TAG" --generate-notes
          assets=(build/*.zip)
          if compgen -G "build/*.dmg" > /dev/null; then
            assets+=(build/*.dmg)
          fi
          gh release upload "$RELEASE_TAG" "${assets[@]}" --clobber

      - name: Commit Sparkle appcast
        if: ${{ env.SPARKLE_ED_PRIVATE_KEY != '' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/appcast.xml
          git diff --cached --quiet && exit 0
          git commit -m "Update appcast for $RELEASE_TAG [skip ci]"
          git push origin HEAD:main

      - name: Configure GitHub Pages
        if: ${{ env.SPARKLE_ED_PRIVATE_KEY != '' }}
        continue-on-error: true
        uses: actions/configure-pages@v6

      - name: Upload appcast to GitHub Pages
        if: ${{ env.SPARKLE_ED_PRIVATE_KEY != '' }}
        continue-on-error: true
        uses: actions/upload-pages-artifact@v4
        with:
          path: docs

      - name: Deploy appcast to GitHub Pages
        id: deploy-pages
        if: ${{ env.SPARKLE_ED_PRIVATE_KEY != '' }}
        continue-on-error: true
        uses: actions/deploy-pages@v4
