name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: true

jobs:
  release:
    name: Build & publish release assets
    runs-on: macos-15
    env:
      SPARKLE_ED_PRIVATE_KEY: ${{ secrets.SPARKLE_ED_PRIVATE_KEY }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve release tag
        run: |
          VERSION="$(/usr/libexec/PlistBuddy -c 'Print CFBundleShortVersionString' scripts/AppInfo.plist)"
          TAG="v$VERSION"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "RELEASE_TAG=$TAG" >> "$GITHUB_ENV"

      - name: Tag current commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -f "$RELEASE_TAG" "$GITHUB_SHA"
          git push --force origin "refs/tags/$RELEASE_TAG"

      - name: Select Xcode 16 (Swift 6)
        run: sudo xcode-select -s /Applications/Xcode_16.app

      - name: Import Developer ID certificate
        if: ${{ env.CERT != '' }}
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.MACOS_CERT_P12 }}
          p12-password: ${{ secrets.MACOS_CERT_PASSWORD }}
        env:
          CERT: ${{ secrets.MACOS_CERT_P12 }}

      - name: Build app for ZIP
        run: |
          ./scripts/build-app.sh release || {
            echo "Universal app build failed; retrying native release build for ZIP."
            KABIGON_UNIVERSAL=0 ./scripts/build-app.sh release
          } || {
            echo "Native release build failed; retrying native debug build for ZIP."
            KABIGON_UNIVERSAL=0 ./scripts/build-app.sh debug
          }

      - name: Create ZIP release asset
        run: |
          ditto -c -k --keepParent build/Kabigon.app "build/Kabigon-$VERSION.zip"
          shasum -a 256 "build/Kabigon-$VERSION.zip"

      - name: Write Sparkle appcast
        if: ${{ env.SPARKLE_ED_PRIVATE_KEY != '' }}
        run: ./scripts/write-appcast.sh "$VERSION" "build/Kabigon-$VERSION.zip"

      - name: Build DMG (optional)
        continue-on-error: true
        run: ./scripts/ci-dmg.sh
        env:
          SIGN_IDENTITY: ${{ secrets.MACOS_SIGN_IDENTITY }}
          AC_API_KEY_P8: ${{ secrets.AC_API_KEY_P8 }}
          AC_KEY_ID: ${{ secrets.AC_KEY_ID }}
          AC_ISSUER_ID: ${{ secrets.AC_ISSUER_ID }}

      - name: Publish to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "$RELEASE_TAG" >/dev/null 2>&1 \
            || gh release create "$RELEASE_TAG" --target "$GITHUB_SHA" --title "Kabigon $RELEASE_TAG" --generate-notes
          assets=(build/*.zip)
          if compgen -G "build/*.dmg" > /dev/null; then
            assets+=(build/*.dmg)
          fi
          gh release upload "$RELEASE_TAG" "${assets[@]}" --clobber

      - name: Commit Sparkle appcast
        if: ${{ env.SPARKLE_ED_PRIVATE_KEY != '' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/appcast.xml
          git diff --cached --quiet && exit 0
          git commit -m "Update appcast for $RELEASE_TAG [skip ci]"
          git push origin HEAD:main
