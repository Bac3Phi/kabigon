name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    name: Build & Test
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode 16 (Swift 6)
        run: |
          set -euo pipefail
          XCODE_PATH="$(find /Applications -maxdepth 1 -name 'Xcode_16*.app' -print | sort | tail -n 1)"
          if [ -z "$XCODE_PATH" ]; then
            echo "No Xcode 16 installation found. Available Xcodes:"
            ls -d /Applications/Xcode*.app || true
            exit 1
          fi
          sudo xcode-select -s "$XCODE_PATH/Contents/Developer"
      - name: Show Swift version
        run: |
          xcodebuild -version
          swift --version
      - name: Build
        run: swift build -v
      - name: Test
        run: swift test
